# imx471.yaml for libcamera Simple IPA
# SPDX-License-Identifier: CC0-1.0
# Calibrated from IMX471_AAJH5-D_LNL.aiqb
%YAML 1.1
---
version: 1
algorithms:
  - BlackLevel:
      blackLevel: 4096  # TODO: set correct value from sensor datasheet
  - Awb:
      maxGainR: 4.00
      maxGainB: 7.00
      speed: 0.25
  - Ccm:
      ccms:
        - ct: 4500
          ccm: [ 
            1.95, -0.45, -0.35, 
            -0.40, 0.95, -0.05,
            -0.20, -0.50, 2.00 ]
  - Adjust:
      gamma: 2.2
      contrast: 1.0
      saturation: 1.0
  - Agc:
...
